{% extends "main/base.html" %}
{% load static %}

{% block css %}
    <link rel="stylesheet" href="{% static 'deps/css/my_footer_css.css' %}">
<style>
        body {
            background-image: url("{% static 'deps/images/bg-image.jpg' %}");
            background-attachment: fixed; /* Щоб фон не совався при скролі */
            background-size: cover;      /* Щоб картинка розтягнулася на весь екран */
            background-position: center;
            background-repeat: no-repeat;
        }
    </style>
{% endblock %}


{% block content %}
    <div class="mt-5 pt-5 bg-white custom-shadow round">
    <h2 class="mt-2 "><strong>{{ content }}</strong></h2>
    <p class = "mt-2" >{{ text_on_page }}</p>
    </div>
{% endblock %}

{% block footer %}
<footer class="py-4 bg-dark">
        <div class="container">
            <p class="m-0 text-center text-white">Copyright &copy; Home Python Hub Studio 2023</p>
        </div>
    </footer>
{% endblock %}
